<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- 어두운 새벽 배경 -->
  <defs>
    <linearGradient id="crisis" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3D4A6B"/>
      <stop offset="100%" stop-color="#7A8AA8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#crisis)"/>
  <rect y="350" width="800" height="150" fill="#FFFFFF"/>
  <!-- 도로 -->
  <rect y="380" width="800" height="60" fill="#5A5A5A"/>
  <line x1="0" y1="410" x2="60" y2="410" stroke="#FFE066" stroke-width="3" stroke-dasharray="20,15"/>
  <line x1="100" y1="410" x2="160" y2="410" stroke="#FFE066" stroke-width="3" stroke-dasharray="20,15"/>
  <line x1="200" y1="410" x2="260" y2="410" stroke="#FFE066" stroke-width="3" stroke-dasharray="20,15"/>
  <line x1="300" y1="410" x2="360" y2="410" stroke="#FFE066" stroke-width="3" stroke-dasharray="20,15"/>
  <line x1="600" y1="410" x2="660" y2="410" stroke="#FFE066" stroke-width="3" stroke-dasharray="20,15"/>
  <line x1="700" y1="410" x2="760" y2="410" stroke="#FFE066" stroke-width="3" stroke-dasharray="20,15"/>
  
  <!-- 눈송이 -->
  <g fill="#FFFFFF" opacity="0.8">
    <circle cx="100" cy="80" r="3"/>
    <circle cx="250" cy="120" r="2.5"/>
    <circle cx="380" cy="60" r="3"/>
    <circle cx="500" cy="100" r="2"/>
    <circle cx="600" cy="150" r="3"/>
    <circle cx="700" cy="80" r="2.5"/>
    <circle cx="150" cy="200" r="2"/>
    <circle cx="300" cy="180" r="2.5"/>
  </g>
  
  <!-- 구급차 -->
  <g transform="translate(400, 290)">
    <!-- 차체 -->
    <rect x="-100" y="0" width="200" height="80" rx="6" fill="#FFFFFF" stroke="#0B3D91" stroke-width="3"/>
    <!-- 운전석 -->
    <rect x="-100" y="20" width="50" height="60" rx="4" fill="#FFFFFF" stroke="#0B3D91" stroke-width="3"/>
    <!-- 창문 -->
    <rect x="-95" y="28" width="40" height="30" fill="#A8D0F0" stroke="#0B3D91" stroke-width="2"/>
    <!-- 후방 창문 -->
    <rect x="-40" y="15" width="130" height="35" fill="#A8D0F0" stroke="#0B3D91" stroke-width="2"/>
    <!-- 경광등 -->
    <rect x="-50" y="-10" width="100" height="14" rx="3" fill="#E63946"/>
    <rect x="-50" y="-10" width="50" height="14" rx="3" fill="#FFFFFF"/>
    <circle cx="-25" cy="-3" r="6" fill="#E63946"/>
    <circle cx="25" cy="-3" r="6" fill="#0B3D91"/>
    <!-- 십자가 (의료) -->
    <rect x="20" y="55" width="40" height="20" fill="#E63946"/>
    <rect x="35" y="50" width="10" height="30" fill="#E63946"/>
    <rect x="22" y="62" width="36" height="6" fill="#FFFFFF"/>
    <rect x="37" y="55" width="6" height="20" fill="#FFFFFF"/>
    <!-- 바퀴 -->
    <circle cx="-65" cy="80" r="14" fill="#2A2A2A"/>
    <circle cx="-65" cy="80" r="6" fill="#5A5A5A"/>
    <circle cx="65" cy="80" r="14" fill="#2A2A2A"/>
    <circle cx="65" cy="80" r="6" fill="#5A5A5A"/>
    <!-- 사이렌 효과 -->
    <circle cx="-25" cy="-3" r="14" fill="#E63946" opacity="0.3"/>
    <circle cx="25" cy="-3" r="14" fill="#0B3D91" opacity="0.3"/>
  </g>
  
  <!-- 병원/건물 (배경) -->
  <rect x="60" y="200" width="120" height="180" fill="#D4D4D4"/>
  <rect x="60" y="200" width="120" height="20" fill="#0B3D91"/>
  <text x="120" y="215" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="11" font-weight="bold">+</text>
  <!-- 병원 창문 -->
  <rect x="75" y="235" width="20" height="20" fill="#FFE066"/>
  <rect x="105" y="235" width="20" height="20" fill="#A8D0F0"/>
  <rect x="135" y="235" width="20" height="20" fill="#FFE066"/>
  <rect x="75" y="270" width="20" height="20" fill="#A8D0F0"/>
  <rect x="105" y="270" width="20" height="20" fill="#FFE066"/>
  <rect x="135" y="270" width="20" height="20" fill="#A8D0F0"/>
  <rect x="75" y="305" width="20" height="20" fill="#FFE066"/>
  <rect x="105" y="305" width="20" height="20" fill="#A8D0F0"/>
  <rect x="135" y="305" width="20" height="20" fill="#FFE066"/>
  <!-- 병원 십자가 -->
  <rect x="105" y="160" width="30" height="40" fill="#E63946"/>
  <rect x="115" y="155" width="10" height="50" fill="#E63946"/>
  <rect x="108" y="173" width="24" height="14" fill="#FFFFFF"/>
  <rect x="117" y="160" width="6" height="40" fill="#FFFFFF"/>
  
  <!-- 멀리 있는 건물들 (실루엣) -->
  <rect x="600" y="250" width="80" height="130" fill="#5A6B85" opacity="0.6"/>
  <rect x="700" y="270" width="60" height="110" fill="#5A6B85" opacity="0.6"/>
  <rect x="610" y="270" width="12" height="15" fill="#FFE066" opacity="0.7"/>
  <rect x="640" y="290" width="12" height="15" fill="#FFE066" opacity="0.7"/>
  <rect x="715" y="290" width="10" height="12" fill="#FFE066" opacity="0.7"/>
  
  <!-- 텍스트 -->
  <text x="400" y="465" text-anchor="middle" fill="#E63946" font-family="sans-serif" font-size="32" font-weight="bold">위기 상황</text>
  <text x="400" y="490" text-anchor="middle" fill="#5A4A3A" font-family="sans-serif" font-size="14">어떤 선택이 위험했는지 다시 살펴봅시다</text>
</svg>
