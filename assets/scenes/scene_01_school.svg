<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5A7BAF"/>
      <stop offset="100%" stop-color="#A8D0F0"/>
    </linearGradient>
  </defs>
  <!-- 하늘 -->
  <rect width="800" height="350" fill="url(#sky1)"/>
  <!-- 눈 쌓인 땅 -->
  <rect y="350" width="800" height="150" fill="#F0F4F8"/>
  <path d="M 0 360 Q 400 340, 800 360 L 800 350 L 0 350 Z" fill="#FFFFFF"/>
  
  <!-- 학교 건물 -->
  <rect x="450" y="180" width="280" height="180" fill="#D4A574"/>
  <rect x="450" y="160" width="280" height="25" fill="#8B6F47"/>
  <!-- 학교 창문들 -->
  <rect x="475" y="200" width="35" height="40" fill="#A8D0F0" stroke="#0B3D91" stroke-width="2"/>
  <rect x="525" y="200" width="35" height="40" fill="#A8D0F0" stroke="#0B3D91" stroke-width="2"/>
  <rect x="575" y="200" width="35" height="40" fill="#A8D0F0" stroke="#0B3D91" stroke-width="2"/>
  <rect x="625" y="200" width="35" height="40" fill="#A8D0F0" stroke="#0B3D91" stroke-width="2"/>
  <rect x="675" y="200" width="35" height="40" fill="#A8D0F0" stroke="#0B3D91" stroke-width="2"/>
  <rect x="475" y="260" width="35" height="40" fill="#A8D0F0" stroke="#0B3D91" stroke-width="2"/>
  <rect x="525" y="260" width="35" height="40" fill="#A8D0F0" stroke="#0B3D91" stroke-width="2"/>
  <rect x="575" y="260" width="35" height="40" fill="#A8D0F0" stroke="#0B3D91" stroke-width="2"/>
  <rect x="625" y="260" width="35" height="40" fill="#A8D0F0" stroke="#0B3D91" stroke-width="2"/>
  <rect x="675" y="260" width="35" height="40" fill="#A8D0F0" stroke="#0B3D91" stroke-width="2"/>
  <!-- 정문 기둥 -->
  <rect x="380" y="220" width="20" height="140" fill="#5A4A3A"/>
  <rect x="430" y="220" width="20" height="140" fill="#5A4A3A"/>
  <rect x="375" y="210" width="80" height="15" fill="#0B3D91"/>
  
  <!-- 가로수 (눈 쌓인 나무) -->
  <rect x="80" y="280" width="12" height="80" fill="#5A4A3A"/>
  <circle cx="86" cy="270" r="35" fill="#FFFFFF" stroke="#A8D0F0" stroke-width="2"/>
  
  <rect x="280" y="290" width="10" height="70" fill="#5A4A3A"/>
  <circle cx="285" cy="280" r="28" fill="#FFFFFF" stroke="#A8D0F0" stroke-width="2"/>
  
  <!-- 학생 캐릭터 -->
  <!-- 머리 -->
  <circle cx="200" cy="270" r="24" fill="#F4D5B5"/>
  <!-- 머리카락 -->
  <path d="M 178 260 Q 178 245, 200 245 Q 222 245, 222 260 Q 222 250, 200 248 Q 178 250, 178 260 Z" fill="#3D2817"/>
  <!-- 눈 -->
  <circle cx="192" cy="270" r="2" fill="#0B3D91"/>
  <circle cx="208" cy="270" r="2" fill="#0B3D91"/>
  <!-- 입 -->
  <path d="M 196 280 Q 200 282, 204 280" stroke="#0B3D91" stroke-width="1.5" fill="none"/>
  <!-- 목도리 -->
  <ellipse cx="200" cy="298" rx="28" ry="8" fill="#E63946"/>
  <!-- 교복 상의 -->
  <path d="M 170 300 Q 170 380, 180 380 L 220 380 Q 230 380, 230 300 Z" fill="#0B3D91"/>
  <!-- 가방 끈 -->
  <line x1="180" y1="310" x2="180" y2="360" stroke="#3D2817" stroke-width="3"/>
  <line x1="220" y1="310" x2="220" y2="360" stroke="#3D2817" stroke-width="3"/>
  <!-- 다리 -->
  <rect x="184" y="380" width="14" height="40" fill="#2A2A2A"/>
  <rect x="202" y="380" width="14" height="40" fill="#2A2A2A"/>
  
  <!-- 휴대폰 (알림 표시) -->
  <rect x="225" y="335" width="30" height="48" rx="4" fill="#2A2A2A"/>
  <rect x="228" y="340" width="24" height="38" fill="#A8D0F0"/>
  <!-- 알림 빛 -->
  <circle cx="270" cy="340" r="20" fill="#E63946" opacity="0.3"/>
  <circle cx="270" cy="340" r="12" fill="#E63946" opacity="0.5"/>
  <text x="270" y="345" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="16" font-weight="bold">!</text>
  
  <!-- 눈송이 (떨어지는 눈) -->
  <g fill="#FFFFFF">
    <circle cx="100" cy="80" r="3"/>
    <circle cx="250" cy="120" r="2.5"/>
    <circle cx="380" cy="60" r="3"/>
    <circle cx="500" cy="100" r="2"/>
    <circle cx="600" cy="50" r="3"/>
    <circle cx="700" cy="130" r="2.5"/>
    <circle cx="150" cy="180" r="2"/>
    <circle cx="320" cy="200" r="2.5"/>
    <circle cx="450" cy="160" r="2"/>
    <circle cx="650" cy="220" r="3"/>
  </g>
