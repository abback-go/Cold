<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- 어두운 배경 -->
  <rect width="800" height="500" fill="#1A1F2E"/>
  <!-- 바닥 -->
  <rect y="380" width="800" height="120" fill="#0D1117"/>
  
  <!-- 창밖 (다른 집들도 어두움, 달빛만) -->
  <rect x="50" y="60" width="220" height="200" fill="#0A0F1A"/>
  <rect x="58" y="68" width="204" height="184" fill="#1A2540"/>
  <line x1="160" y1="68" x2="160" y2="252" stroke="#2A3550" stroke-width="2"/>
  <line x1="58" y1="160" x2="262" y2="160" stroke="#2A3550" stroke-width="2"/>
  
  <!-- 달 -->
  <circle cx="220" cy="100" r="20" fill="#F4F4DC" opacity="0.9"/>
  <circle cx="225" cy="95" r="20" fill="#1A2540" opacity="0.5"/>
  
  <!-- 옆집 실루엣 (어두움) -->
  <rect x="70" y="180" width="60" height="60" fill="#0A0F1A"/>
  <path d="M 60 180 L 100 155 L 140 180 Z" fill="#0A0F1A"/>
  <rect x="170" y="200" width="50" height="50" fill="#0A0F1A"/>
  <path d="M 165 200 L 195 180 L 225 200 Z" fill="#0A0F1A"/>
  
  <!-- 눈 (창밖) -->
  <g fill="#FFFFFF" opacity="0.6">
    <circle cx="90" cy="100" r="2"/>
    <circle cx="130" cy="130" r="2"/>
    <circle cx="180" cy="140" r="2"/>
    <circle cx="240" cy="130" r="2"/>
    <circle cx="100" cy="160" r="2"/>
  </g>
  
  <!-- 손전등 빛 (방 안 비추는) -->
  <defs>
    <radialGradient id="flashlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF4B0" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FFE066" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFE066" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="500" cy="320" rx="200" ry="120" fill="url(#flashlight)"/>
  
  <!-- 손전등 (들고 있는) -->
  <g transform="translate(380, 280) rotate(20)">
    <rect x="0" y="0" width="60" height="20" rx="3" fill="#2A2A2A"/>
    <rect x="55" y="-4" width="20" height="28" rx="3" fill="#5A5A5A"/>
    <ellipse cx="78" cy="10" rx="3" ry="10" fill="#FFE066"/>
  </g>
  
  <!-- 플레이어 캐릭터 (실루엣 + 빛) -->
  <circle cx="350" cy="240" r="22" fill="#3D4A6B"/>
  <path d="M 333 245 Q 333 233, 350 233 Q 367 233, 367 245" fill="#1A1F2E"/>
  <!-- 눈 (걱정) -->
  <circle cx="343" cy="240" r="1.5" fill="#FFE066"/>
  <circle cx="357" cy="240" r="1.5" fill="#FFE066"/>
  <!-- 입 -->
  <path d="M 344 252 Q 350 250, 356 252" stroke="#FFE066" stroke-width="1.2" fill="none"/>
  <!-- 몸 -->
  <path d="M 320 265 Q 320 360, 330 380 L 370 380 Q 380 360, 380 265 Z" fill="#3D4A6B"/>
  
  <!-- 동생 (우는 표정) -->
  <circle cx="500" cy="290" r="20" fill="#3D4A6B"/>
  <path d="M 484 295 Q 484 282, 500 282 Q 516 282, 516 295" fill="#1A1F2E"/>
  <!-- 눈물 -->
  <path d="M 491 296 L 489 305" stroke="#A8D0F0" stroke-width="2" stroke-linecap="round"/>
  <path d="M 509 296 L 511 305" stroke="#A8D0F0" stroke-width="2" stroke-linecap="round"/>
  <!-- 슬픈 입 -->
  <path d="M 494 308 Q 500 312, 506 308" stroke="#1A1F2E" stroke-width="1.5" fill="none"/>
  <!-- 몸 (담요) -->
  <path d="M 470 310 Q 470 380, 480 390 L 520 390 Q 530 380, 530 310 Z" fill="#5A6B85"/>
  
  <!-- 꺼진 천장 등 -->
  <line x1="600" y1="0" x2="600" y2="60" stroke="#0D1117" stroke-width="3"/>
  <ellipse cx="600" cy="80" rx="50" ry="20" fill="#0D1117"/>
  <ellipse cx="600" cy="78" rx="46" ry="16" fill="#1A1F2E"/>
  <!-- X 표시 -->
  <text x="660" y="85" fill="#E63946" font-family="sans-serif" font-size="20" font-weight="bold">✕</text>
  
  <!-- 시계 (어둠 속 11시) -->
  <circle cx="700" cy="180" r="30" fill="#0D1117" stroke="#5A6B85" stroke-width="2"/>
  <line x1="700" y1="180" x2="700" y2="160" stroke="#5A6B85" stroke-width="2"/>
  <line x1="700" y1="180" x2="700" y2="195" stroke="#E63946" stroke-width="2"/>
  <circle cx="700" cy="180" r="2" fill="#E63946"/>
  <text x="700" y="225" text-anchor="middle" fill="#5A6B85" font-family="sans-serif" font-size="10" font-weight="bold">PM 11:00</text>
</svg>
