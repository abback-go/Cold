<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="600" height="250">
  <defs>
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B3D91"/>
      <stop offset="100%" stop-color="#4A90E2"/>
    </linearGradient>
    <linearGradient id="iceText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#A8D0F0"/>
    </linearGradient>
  </defs>
  
  <!-- 배경 -->
  <rect width="600" height="250" rx="20" fill="url(#logoBg)"/>
  
  <!-- 눈송이 장식 -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.4">
    <g transform="translate(60, 60)">
      <line x1="-15" y1="0" x2="15" y2="0"/>
      <line x1="0" y1="-15" x2="0" y2="15"/>
      <line x1="-10" y1="-10" x2="10" y2="10"/>
      <line x1="-10" y1="10" x2="10" y2="-10"/>
    </g>
    <g transform="translate(540, 80)">
      <line x1="-12" y1="0" x2="12" y2="0"/>
      <line x1="0" y1="-12" x2="0" y2="12"/>
      <line x1="-8" y1="-8" x2="8" y2="8"/>
      <line x1="-8" y1="8" x2="8" y2="-8"/>
    </g>
    <g transform="translate(80, 190)">
      <line x1="-10" y1="0" x2="10" y2="0"/>
      <line x1="0" y1="-10" x2="0" y2="10"/>
      <line x1="-7" y1="-7" x2="7" y2="7"/>
      <line x1="-7" y1="7" x2="7" y2="-7"/>
    </g>
    <g transform="translate(530, 200)">
      <line x1="-13" y1="0" x2="13" y2="0"/>
      <line x1="0" y1="-13" x2="0" y2="13"/>
      <line x1="-9" y1="-9" x2="9" y2="9"/>
      <line x1="-9" y1="9" x2="9" y2="-9"/>
    </g>
  </g>
  
  <!-- 작은 눈송이들 -->
  <g fill="#FFFFFF" opacity="0.6">
    <circle cx="150" cy="40" r="3"/>
    <circle cx="450" cy="50" r="2.5"/>
    <circle cx="200" cy="220" r="2"/>
    <circle cx="400" cy="210" r="3"/>
    <circle cx="120" cy="120" r="2"/>
    <circle cx="480" cy="140" r="2.5"/>
  </g>
  
  <!-- 메인 타이틀 -->
  <text x="300" y="105" text-anchor="middle" fill="url(#iceText)" font-family="sans-serif" font-size="52" font-weight="900" stroke="#0B3D91" stroke-width="1">콜드 서바이벌</text>
  
  <!-- 부제 -->
  <line x1="180" y1="130" x2="420" y2="130" stroke="#A8D0F0" stroke-width="2" opacity="0.6"/>
  <text x="300" y="170" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="28" font-weight="bold">한파 72시간</text>
  
  <!-- 태그라인 -->
  <text x="300" y="210" text-anchor="middle" fill="#A8D0F0" font-family="sans-serif" font-size="14">중학생을 위한 한파 재난 대응 게임</text>
</svg>
